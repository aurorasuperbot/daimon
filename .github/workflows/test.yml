name: Tests

on:
  push:
    branches: [main, monster-pivot]
  pull_request:
    branches: [main, monster-pivot]

# Run jobs in parallel; cancel in-flight runs on the same ref when a new push
# arrives so PRs don't pile up in the queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev + mcp extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Run pytest
        # `gh` CLI tests are mocked via _FakeGh; no network or auth needed.
        # Don't pull art-pack — engine tests use fixtures only.
        env:
          DAIMON_NO_AUTO_UPDATE: "1"
        run: pytest -v --tb=short

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: pip install "ruff>=0.1"

      - name: Lint
        # Non-blocking for now — engine has 1421 passing tests but lint pass
        # hasn't been done yet. Surface warnings without failing CI.
        # Flip to hard-fail once cleanup PR lands.
        run: ruff check . || true
