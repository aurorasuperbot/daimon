name: WezTerm Bundle Release

# Builds and uploads DAIMON-flavoured WezTerm bundles to a GitHub Release.
#
# Triggers:
#   * Tag push matching `wezterm-bundle-v*` — auto-creates the release and
#     uploads every (os, arch) artifact + .sha256 sidecar.
#   * Manual workflow_dispatch — produces artifacts you can download from the
#     run summary without creating a release (useful for dry-runs).
#
# Matrix:
#   linux/x86_64       — upstream Ubuntu22.04.tar.xz
#   macos/x86_64       — upstream macOS .zip (universal binary, both arches share)
#   macos/aarch64      — same upstream macOS .zip as x86_64
#   windows/x86_64     — upstream Windows .zip
#
# Every target runs on ubuntu-latest. The build script is pure stdlib
# (urllib + tarfile + zipfile) and does no compilation — it downloads an
# upstream artifact and re-packages select binaries into a flat .tar.gz.
# Nothing in that pipeline is platform-specific, so paying for scarce
# macos-13 / macos-14 / windows-latest runners is pure waste; burned
# 2026-04-25 when wezterm-bundle-v1.0's macos-13 job sat in queue 2+ hours
# while linux/macos-aarch64/windows finished in <1 minute each.
#
# Linux aarch64 is intentionally absent — upstream WezTerm has no official
# Linux ARM build. Adding it requires a build-from-source job (deferred V1).
#
# The DAIMON release tag controls our bundle version; the upstream WezTerm
# version is pinned by `WEZTERM_VERSION` below.

on:
  push:
    tags:
      - "wezterm-bundle-v*"
  workflow_dispatch:
    inputs:
      wezterm_version:
        description: "Upstream WezTerm release tag to bundle"
        required: false
        default: "20240203-110809-5046fc22"

env:
  # Default upstream WezTerm release; overridable via workflow_dispatch input.
  WEZTERM_VERSION: ${{ github.event.inputs.wezterm_version || '20240203-110809-5046fc22' }}

permissions:
  contents: write  # needed to create release + upload assets

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # don't cancel a release mid-upload

jobs:
  build:
    name: build ${{ matrix.target_os }}-${{ matrix.target_arch }}
    # Every target builds on ubuntu-latest — see file header for rationale.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: linux
            target_arch: x86_64
          - target_os: macos
            target_arch: x86_64
          - target_os: macos
            target_arch: aarch64
          - target_os: windows
            target_arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build bundle (${{ matrix.target_os }}/${{ matrix.target_arch }})
        # Pure-stdlib script: no `pip install` needed on the runner.
        run: |
          python scripts/build_wezterm_bundle.py \
            --wezterm-version "${WEZTERM_VERSION}" \
            --target-os "${{ matrix.target_os }}" \
            --target-arch "${{ matrix.target_arch }}" \
            --output-dir dist
        shell: bash

      - name: List built artifacts
        run: ls -la dist/
        shell: bash

      - name: Upload run artifacts
        # Always upload — useful for workflow_dispatch dry-runs and for
        # debugging release jobs that fail at the upload step.
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

  release:
    name: publish release
    # Only run on tag pushes, after every matrix bundle is built.
    if: startsWith(github.ref, 'refs/tags/wezterm-bundle-v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Needed so the release notes can reference the script that built
        # the bundles + the upstream version pinned at this commit.
        uses: actions/checkout@v4

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          # Flatten artifact directories so every .tar.gz + .sha256 lands at
          # dist/<filename> rather than dist/bundle-<os>-<arch>/<filename>.
          merge-multiple: true

      - name: List release artifacts
        run: ls -la dist/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tag the user pushed (e.g. wezterm-bundle-v1.0).
          tag_name: ${{ github.ref_name }}
          name: "DAIMON WezTerm Bundle ${{ github.ref_name }}"
          body: |
            DAIMON-flavoured WezTerm bundle.

            **Upstream WezTerm version:** `${{ env.WEZTERM_VERSION }}`
            **Built from:** `${{ github.sha }}`

            Each `daimon-wezterm-{os}-{arch}.tar.gz` is a flat archive of the
            WezTerm binaries DAIMON ships. Verify with the matching
            `.sha256` sidecar before extracting:

            ```
            sha256sum -c daimon-wezterm-linux-x86_64.tar.gz.sha256
            ```

            The `daimon install` CLI command resolves this release
            automatically — users do not download these by hand.
          files: |
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true
          # Don't draft — `daimon install` looks up tagged releases via the
          # GitHub API and drafts are filtered out.
          draft: false
          prerelease: false
