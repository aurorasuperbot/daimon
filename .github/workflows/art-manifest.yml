name: Art Manifest Release

# Builds the lazy-art assets — a small `manifest.json` + per-card
# tarballs — and uploads them as GitHub Release assets so the runtime
# manifest fetcher (``daimon.update.manifest.fetch_manifest``) can
# resolve them.
#
# Triggered by `art-v*` tags. The release tag becomes the
# ``pack_version`` that ships in the manifest payload, so a card pack
# upgrade is just "build new manifest + per-card tarballs, push tag".
#
# This workflow REPLACES the legacy monolithic ``art-pack-v*`` flow:
# instead of a single 1.6GB tarball that every install pulls down on
# first launch, we ship one ~50–500KB tarball per card plus a
# manifest small enough (~50KB) to fetch on every onboarding run.
#
# Pure Python build — no C compiler, no native runners, no caching
# tricks. Uses ``scripts/build_art_manifest.py``.

on:
  push:
    tags:
      - "art-v*"
  workflow_dispatch:
    inputs:
      pack_name:
        description: "Logical pack name written into the manifest"
        required: false
        default: "v1_alpha"
      art_source_dir:
        description: "Path inside the repo (or downloaded artifact dir) to scan for card art"
        required: false
        default: "art_source"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install daimon-engine (for the Manifest model + card loaders)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build art manifest + per-card tarballs
        env:
          PACK_VERSION: ${{ github.ref_name }}
          PACK_NAME: ${{ github.event.inputs.pack_name || 'v1_alpha' }}
          # The art source dir must contain one subdir per card_id with
          # base.png + manifest.json + sidecars. For the V1 pipeline
          # this is checked into the repo at the path below; for V2
          # we'll add a "download from upstream artifact" step.
          ART_SOURCE_DIR: ${{ github.event.inputs.art_source_dir || 'art_source' }}
          # Where the runtime will fetch per-card tarballs from.
          # The release asset URL pattern is stable.
          ASSET_BASE_URL: "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
        run: |
          mkdir -p dist
          if [[ ! -d "${ART_SOURCE_DIR}" ]]; then
            echo "::error::Art source directory '${ART_SOURCE_DIR}' not present in checkout."
            echo "::error::Either commit the art under that path or pass a different"
            echo "::error::--art-source-dir via workflow_dispatch."
            exit 1
          fi
          python scripts/build_art_manifest.py \
            --input "${ART_SOURCE_DIR}" \
            --output dist \
            --pack-name "${PACK_NAME}" \
            --pack-version "${PACK_VERSION}" \
            --asset-base-url "${ASSET_BASE_URL}"

      - name: List release assets
        run: ls -la dist/

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: art-manifest-${{ github.ref_name || github.run_id }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/art-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "DAIMON Art Manifest ${{ github.ref_name }}"
          body: |
            Lazy-art manifest + per-card tarballs.

            * `manifest.json` — fetched on every onboarding run; small
              (~50KB) so the cost is negligible.
            * `card_<card_id>.tar.gz` — fetched JIT when a card first
              needs to render, cached locally afterwards.

            Verify each asset against the matching `.sha256` sidecar.
            The runtime fetcher does this automatically; if you mirror
            assets manually, run:

            ```
            sha256sum -c manifest.json.sha256
            ```
          files: |
            dist/manifest.json
            dist/manifest.json.sha256
            dist/card_*.tar.gz
            dist/card_*.tar.gz.sha256
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
