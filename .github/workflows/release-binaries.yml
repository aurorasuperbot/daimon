name: Release Binaries

# Builds standalone DAIMON binaries (Nuitka + bundled WezTerm + dmn-mcp)
# for every supported (OS, arch) and uploads them as GitHub Release
# assets. Triggered by `daimon-v*` tags; manual workflow_dispatch
# produces artifacts you can download from the run summary without
# creating a release.
#
# Native runners are required here (unlike the WezTerm bundle workflow
# which is pure-stdlib repackaging) because Nuitka emits machine-native
# binaries — cross-compilation isn't supported.
#
# Matrix:
#   linux/x86_64       — ubuntu-latest
#   macos/x86_64       — macos-13       (Intel runner; Apple's last x86_64 image)
#   macos/aarch64      — macos-14       (M-series runner)
#   windows/x86_64     — windows-latest
#
# Linux aarch64 is intentionally absent — upstream WezTerm has no
# official Linux ARM build and we won't ship a half-functional binary.
#
# Code signing:
#   * Windows builds optionally sign with a .pfx in WINDOWS_CERT_BASE64
#     + WINDOWS_CERT_PASSWORD secrets. When unset, an unsigned binary
#     ships (acceptable for V1; package managers re-sign downstream).
#   * macOS builds optionally codesign with MACOS_CODESIGN_IDENTITY +
#     MACOS_CODESIGN_CERT_BASE64 + MACOS_CODESIGN_CERT_PASSWORD. The
#     Apple notarization step is deferred — single user-grade Developer
#     ID signature is enough to clear most Gatekeeper paths in V1.

on:
  push:
    tags:
      - "daimon-v*"
  workflow_dispatch:
    inputs:
      wezterm_version:
        description: "Upstream WezTerm release tag to embed"
        required: false
        default: "20240203-110809-5046fc22"

env:
  WEZTERM_VERSION: ${{ github.event.inputs.wezterm_version || '20240203-110809-5046fc22' }}

permissions:
  contents: write   # release creation + asset upload

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.target_os }}-${{ matrix.target_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: linux
            target_arch: x86_64
            runner: ubuntu-latest
          - target_os: macos
            target_arch: x86_64
            runner: macos-13
          - target_os: macos
            target_arch: aarch64
            runner: macos-14
          - target_os: windows
            target_arch: x86_64
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Pin Nuitka to an exact version. ``>=2.4,<3`` is too loose:
          # Nuitka makes user-visible compilation behaviour changes
          # within minor releases (--standalone layout, --include-data
          # path semantics, dependency-resolver internals) and a
          # surprise upgrade between two release builds will
          # silently change the ``.dist`` tree we then merge in
          # ``scripts/build_nuitka.py``. Bumping this pin is a
          # deliberate, reviewed action — bump when we've smoke-tested
          # the new version end-to-end on at least one matrix runner.
          python -m pip install "nuitka==2.4.10" ordered-set zstandard
          # Install the project so Nuitka can resolve daimon imports.
          python -m pip install -e .

      # ---------- Optional code-signing prep ----------

      - name: Decode Windows code-signing cert
        if: matrix.target_os == 'windows' && env.WINDOWS_CERT_BASE64 != ''
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
        shell: bash
        run: |
          mkdir -p ${RUNNER_TEMP}/codesign
          echo "$WINDOWS_CERT_BASE64" | base64 -d > ${RUNNER_TEMP}/codesign/daimon.pfx
          echo "DAIMON_WINDOWS_CERT=${RUNNER_TEMP}/codesign/daimon.pfx" >> $GITHUB_ENV

      - name: Set up macOS code-signing keychain
        if: startsWith(matrix.target_os, 'macos') && env.MACOS_CODESIGN_CERT_BASE64 != ''
        env:
          MACOS_CODESIGN_CERT_BASE64: ${{ secrets.MACOS_CODESIGN_CERT_BASE64 }}
          MACOS_CODESIGN_CERT_PASSWORD: ${{ secrets.MACOS_CODESIGN_CERT_PASSWORD }}
        shell: bash
        run: |
          KEYCHAIN=${RUNNER_TEMP}/daimon-build.keychain-db
          echo "$MACOS_CODESIGN_CERT_BASE64" | base64 -d > ${RUNNER_TEMP}/cert.p12
          security create-keychain -p actions $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p actions $KEYCHAIN
          security import ${RUNNER_TEMP}/cert.p12 \
            -k $KEYCHAIN \
            -P "$MACOS_CODESIGN_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions $KEYCHAIN
          security list-keychains -d user -s $KEYCHAIN $(security list-keychains -d user | tr -d \")
          echo "MACOS_KEYCHAIN=$KEYCHAIN" >> $GITHUB_ENV

      # ---------- Build ----------

      - name: Build with Nuitka
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: bash
        run: |
          set -e
          ARGS=(
            --target-os "${{ matrix.target_os }}"
            --target-arch "${{ matrix.target_arch }}"
            --wezterm-version "${WEZTERM_VERSION}"
            --output-dir dist
            --archive
          )
          if [[ "${{ matrix.target_os }}" == "windows" && -n "${DAIMON_WINDOWS_CERT:-}" ]]; then
            ARGS+=(--windows-cert "${DAIMON_WINDOWS_CERT}")
          fi
          if [[ "${{ matrix.target_os }}" == macos* && -n "${{ secrets.MACOS_CODESIGN_IDENTITY }}" ]]; then
            ARGS+=(--codesign-identity "${{ secrets.MACOS_CODESIGN_IDENTITY }}")
          fi
          python scripts/build_nuitka.py "${ARGS[@]}"

      - name: List built artifacts
        shell: bash
        run: ls -la dist/

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daimon-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: publish release
    if: startsWith(github.ref, 'refs/tags/daimon-v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -la dist/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "DAIMON ${{ github.ref_name }}"
          body: |
            DAIMON standalone binary release.

            Each `daimon-{os}-{arch}.{tar.gz,zip}` is a self-contained
            distribution: the `daimon`/`dmn-mcp` binaries plus the
            embedded WezTerm pack. Verify with the matching `.sha256`
            sidecar before extracting:

            ```
            sha256sum -c daimon-linux-x86_64.tar.gz.sha256
            ```

            **WezTerm version:** `${{ env.WEZTERM_VERSION }}`
            **Built from:** `${{ github.sha }}`

            Package-manager manifests (winget / Scoop / Brew /
            AppImage) consume these archives directly — end users
            should install via their OS package manager rather than
            downloading these by hand.
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
